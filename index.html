<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mieszek.dev – Już wkrótce</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #e4e4f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      opacity: 0.15;
    }
    .bg-blob-1 {
      width: 500px; height: 500px;
      background: #c084fc;
      top: -100px; left: -150px;
    }
    .bg-blob-2 {
      width: 400px; height: 400px;
      background: #7c3aed;
      bottom: -100px; right: -100px;
    }

    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .logo {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 2rem;
      margin-bottom: 40px;
      letter-spacing: -0.5px;
    }
    .logo span {
      color: #c084fc;
      font-size: 2.4rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #c084fc18;
      border: 1px solid #c084fc44;
      color: #c084fc;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 999px;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #c084fc;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 16px;
      color: #f0f0f8;
    }

    h1 .accent {
      color: #c084fc;
    }

    p {
      font-size: 0.95rem;
      color: #8888a8;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(to right, #c084fc, transparent);
      margin: 0 auto 40px;
      border-radius: 2px;
    }

    .contact {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #c084fc;
      color: white;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 12px 24px;
      border-radius: 999px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .contact:hover {
      background: #a855f7;
    }

    .footer {
      position: fixed;
      bottom: 20px;
      font-size: 0.7rem;
      color: #44445a;
    }
  </style>
</head>
<body>

  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>

  <div class="card">

    <div class="logo"><span>M</span>ieszek.dev</div>

    <div class="badge">
      <div class="dot"></div>
      W przebudowie
    </div>

    <h1>Strona jest<br><span class="accent">odświeżana</span></h1>

    <div class="divider"></div>

    <p>Pracuję nad nową wersją strony.<br>Wróć wkrótce — będzie lepiej niż kiedykolwiek.</p>

    <a href="mailto:mieszkonowacki2@gmail.com" class="contact">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" width="16" height="16">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
      </svg>
      Napisz do mnie
    </a>

  </div>

  <p class="footer">© 2026 Mieszek.dev</p>

</body>
</html>
